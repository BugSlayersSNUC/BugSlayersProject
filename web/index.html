<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BugSlayers — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card" id="loginCard">
    <div class="logo">🐛</div>
    <h1>BugSlayers</h1>
    <p class="subtitle">Sign in to continue</p>

    <button id="googleBtn" class="btn btn-google">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.5 6.5 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19.1 12 24 12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.5 6.5 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5.1l-6.2-5.2C29.4 35.5 26.8 36 24 36c-5.3 0-9.7-3.2-11.3-7.8l-6.5 5C9.5 39.4 16.2 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.3 4.1-4.2 5.4l6.2 5.2C37 38 44 33 44 24c0-1.3-.1-2.6-.4-3.9z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider"><span>or</span></div>

    <form id="emailForm">
      <input type="email"   id="email"    placeholder="Email address" required />
      <input type="password" id="password" placeholder="Password"      required />
      <button type="submit" class="btn btn-primary">Sign in</button>
    </form>

    <p class="switch-mode">
      No account? <a href="#" id="switchToRegister">Create one</a>
    </p>

    <p id="errorMsg" class="error hidden"></p>
  </div>

  <!-- Shown after successful login -->
  <div class="card hidden" id="successCard">
    <div class="logo">✅</div>
    <h2>Authenticated!</h2>
    <p class="subtitle">Your server ID token is stored.</p>
    <div class="token-box">
      <label>Server ID Token (JWT)</label>
      <textarea id="tokenDisplay" readonly rows="5"></textarea>
    </div>
    <button id="testAuthBtn" class="btn btn-primary">Test GET /api/auth</button>
    <pre id="apiResponse" class="api-response hidden"></pre>
    <button id="signOutBtn" class="btn btn-outline" style="margin-top:12px">Sign out</button>
  </div>

  <!-- Firebase v10 compat CDN for simplicity -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
